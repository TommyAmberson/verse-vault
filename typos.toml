[files]
extend-exclude = [
    "crates/wasm/pkg/",
    "data/",
    "docs/decks.md", # commit-SHA tables trigger false positives (e.g. `ba` inside `64a4ba6`)
]

[default]

[default.extend-words]
OT = "OT" # old testament
NAM = "NAM" # USX book code for Nahum
nd = "nd" # English ordinal suffix (2nd, 22nd, …); appears as `${day}nd`
thess = "thess" # Bible book abbreviation (Thessalonians)
mis = "mis" # prefix (mis-parsed, mis-attributed, …)
