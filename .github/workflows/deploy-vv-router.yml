name: Deploy vv-router Worker

# Fires on master pushes that change deploy/vv-router/package.json AND
# only deploys when the `version` field actually moved.
on:
  push:
    branches: [master]
    paths:
      - deploy/vv-router/package.json
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying."
            exit 0
          fi
          OLD=$(git show HEAD~1:deploy/vv-router/package.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version deploy/vv-router/package.json)
          echo "old=$OLD new=$NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "deploy/vv-router/package.json touched but version unchanged. Skipping deploy."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: filter
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the release tag
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      # vv-router is a workspace member; root install brings wrangler in
      # under deploy/vv-router/node_modules/.bin/.
      - run: pnpm install --frozen-lockfile

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deploy/vv-router
          command: deploy

      - name: Tag release
        run: |
          version=$(jq -r .version deploy/vv-router/package.json)
          tag="vv-router@${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Deployed @verse-vault/vv-router $version to Cloudflare Workers"
            git push origin "$tag"
            echo "Tagged $tag at $(git rev-parse HEAD)"
          fi
