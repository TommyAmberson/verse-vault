name: Deploy web

# Fires on master pushes that change apps/web/package.json AND only deploys
# when the `version` field actually moved. `workflow_dispatch` is the
# manual escape hatch.
on:
  push:
    branches: [master]
    paths:
      - apps/web/package.json
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying."
            exit 0
          fi
          OLD=$(git show HEAD~1:apps/web/package.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version apps/web/package.json)
          echo "old=$OLD new=$NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "apps/web/package.json touched but version unchanged. Skipping deploy."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: filter
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push the release tag
    steps:
      - uses: actions/checkout@v4

      # WASM toolchain — the web bundle now embeds the verse-vault engine
      # via crates/wasm/pkg-web (bundler target). Built before pnpm install
      # so the `verse-vault-wasm-web` workspace package exists when pnpm
      # resolves apps/web's dependencies.
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/wasm

      - name: Install wasm-pack
        run: curl -sSf https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM (bundler target)
        run: bash tools/build-wasm-web.sh

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Subpath layout: SPA serves from www.versevault.ca/vv/, API calls
          # go through the same prefix. VITE_API_BASE is the origin-relative
          # prefix (subpath only, NOT including `/api`); api.ts paths begin
          # with `/api/`, so the final URLs become `/vv/api/*`. Flip both to
          # root values when we move off the subpath (see docs/deployment.md
          # "Future: cutting over to subdomains").
          VITE_BASE_PATH: /vv/
          VITE_API_BASE: /vv
        run: pnpm --filter @verse-vault/web build

      # Using pnpm dlx wrangler instead of cloudflare/wrangler-action@v3:
      # the action runs `pnpm add wrangler@<v>` at the workspace root if
      # wrangler isn't present, and pnpm v10 errors on adding to root
      # without `-w`. Direct invocation sidesteps that.
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler@3 pages deploy apps/web/dist \
            --project-name=verse-vault-web --branch=master

      - name: Tag release
        run: |
          version=$(jq -r .version apps/web/package.json)
          tag="web@${version}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Deployed @verse-vault/web $version to Cloudflare Pages"
            git push origin "$tag"
            echo "Tagged $tag at $(git rev-parse HEAD)"
          fi
