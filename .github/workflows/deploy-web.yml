name: Deploy web

# Fires on master pushes that change apps/web/package.json AND only deploys
# when the `version` field actually moved. `workflow_dispatch` is the
# manual escape hatch.
on:
  push:
    branches: [master]
    paths:
      - apps/web/package.json
  workflow_dispatch:

jobs:
  filter:
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.check.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bumped=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch — deploying."
            exit 0
          fi
          OLD=$(git show HEAD~1:apps/web/package.json 2>/dev/null | jq -r .version || echo "")
          NEW=$(jq -r .version apps/web/package.json)
          echo "old=$OLD new=$NEW"
          if [ "$OLD" = "$NEW" ]; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "apps/web/package.json touched but version unchanged. Skipping deploy."
          else
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: filter
    if: needs.filter.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          # Subpath layout: SPA serves from www.versevault.ca/vv/, API calls
          # go to /vv/api/*. Flip both to root values when we move off the
          # subpath (see docs/deployment.md "Future: cutting over to subdomains").
          VITE_BASE_PATH: /vv/
          VITE_API_BASE: /vv/api
        run: pnpm --filter @verse-vault/web build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=verse-vault-web --branch=master
