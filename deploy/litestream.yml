# /etc/litestream.yml
#
# Continuous replication of the SQLite DB to S3-compatible storage.
# Backblaze B2 is the cheapest option for this size of DB (cents/month).
#
# Fill in `bucket`, `endpoint`, and credentials before enabling the unit.

dbs:
  - path: /var/lib/verse-vault/verse-vault.db
    replicas:
      - type: s3
        bucket: verse-vault-backup
        path: verse-vault.db
        endpoint: s3.us-west-002.backblazeb2.com
        region: us-west-002
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

        # Keep 24h of point-in-time recovery; older snapshots compact.
        retention: 24h
        snapshot-interval: 1h
        sync-interval: 10s
